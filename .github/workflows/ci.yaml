name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: world
          POSTGRES_PASSWORD: world
          POSTGRES_DB: world
        ports:
          - 5499:5432
        options: >-
          --health-cmd "pg_isready -U world"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    env:
      DATABASE_URL: postgres://world:world@localhost:5499/world
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - run: bun install --frozen-lockfile

      - name: build SDK artifact
        run: bun run build:sdk

      - name: verify sdk/worlds.js is in sync with sdk/src
        run: git diff --exit-code sdk/worlds.js

      - name: typecheck
        run: bunx tsc --noEmit

      - name: e2e tests
        run: bun test
