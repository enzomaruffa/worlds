<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Kart Loop · Worlds Racing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #09090b;
      --surface: #0c0c0f;
      --surface-2: #131317;
      --border: #27272a;
      --gold: #f59e0b;
      --gold-bright: #fbbf24;
      --green: #22c55e;
      --red: #ef4444;
      --text: #e4e4e7;
      --muted: #a1a1aa;
      --dim: #71717a;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #app { position: fixed; inset: 0; }
    canvas#scene { display: block; width: 100%; height: 100%; touch-action: none; }

    /* ── HUD overlay layer ─────────────────────────────────── */
    .hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      padding: max(.7rem, env(safe-area-inset-top)) max(.7rem, env(safe-area-inset-right)) max(.7rem, env(safe-area-inset-bottom)) max(.7rem, env(safe-area-inset-left));
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto 1fr auto;
      gap: .6rem;
    }

    .panel {
      background: rgba(12,12,15,.82);
      border: 1px solid var(--border);
      border-radius: .7rem;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    /* top-left: lap + timer */
    #lapBox {
      grid-column: 1; grid-row: 1;
      padding: .55rem .75rem;
      min-width: 9.5rem;
    }
    #lapBox .row { display: flex; align-items: baseline; gap: .4rem; }
    #lapBox .lap-n { font-size: 1.5rem; font-weight: 700; line-height: 1; color: var(--text); }
    #lapBox .lap-of { font-size: .8rem; color: var(--dim); }
    #lapBox .timer { font-size: 1.7rem; font-weight: 700; color: var(--gold-bright); font-variant-numeric: tabular-nums; letter-spacing: .01em; line-height: 1.05; }
    #lapBox .best { font-size: .76rem; color: var(--muted); margin-top: .15rem; }
    #lapBox .best b { color: var(--gold); font-weight: 600; }
    #lapBox .last { font-size: .72rem; color: var(--dim); }
    #lapBox .last.good { color: var(--green); }

    /* top-center: brand / wrong-way warning */
    #topCenter {
      grid-column: 2; grid-row: 1;
      justify-self: center;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: .3rem;
    }
    #brand {
      font-size: .78rem; font-weight: 600; letter-spacing: .18em; text-transform: uppercase;
      color: var(--dim);
    }
    #brand b { color: var(--gold); }
    #wrongWay {
      padding: .25rem .7rem; border-radius: 999px;
      background: rgba(239,68,68,.16); border: 1px solid var(--red);
      color: #fecaca; font-weight: 700; font-size: .8rem; letter-spacing: .06em; text-transform: uppercase;
      opacity: 0; transition: opacity .15s;
    }
    #wrongWay.show { opacity: 1; animation: pulseWarn .8s infinite; }
    @keyframes pulseWarn { 0%,100% { opacity: 1; } 50% { opacity: .55; } }

    /* top-right: leaderboard */
    #board {
      grid-column: 3; grid-row: 1;
      padding: .55rem .7rem;
      min-width: 12.5rem; max-width: 16rem;
      align-self: start;
    }
    #board h3 {
      margin: 0 0 .4rem; font-size: .7rem; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase; color: var(--dim);
      display: flex; align-items: center; gap: .4rem;
    }
    #board h3 .live {
      width: .45rem; height: .45rem; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 7px var(--green);
    }
    #board ol { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: .18rem; }
    #board li {
      display: grid; grid-template-columns: 1.1rem 1fr auto; gap: .45rem; align-items: center;
      font-size: .82rem; padding: .12rem .15rem; border-radius: .35rem;
    }
    #board li .pos { color: var(--dim); font-weight: 600; text-align: right; }
    #board li .who { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #board li .ms { color: var(--gold-bright); font-weight: 600; font-variant-numeric: tabular-nums; }
    #board li.me { background: rgba(245,158,11,.12); }
    #board li.me .who { color: var(--gold-bright); font-weight: 600; }
    #board .empty { font-size: .76rem; color: var(--dim); padding: .2rem .1rem; }

    /* bottom-left: speed + racers connected */
    #speedBox {
      grid-column: 1; grid-row: 3;
      padding: .45rem .7rem; align-self: end;
    }
    #speedBox .spd { font-size: 1.6rem; font-weight: 700; line-height: 1; color: var(--text); font-variant-numeric: tabular-nums; }
    #speedBox .unit { font-size: .7rem; color: var(--dim); font-weight: 500; }
    #speedBox .racers { font-size: .74rem; color: var(--muted); margin-top: .2rem; }
    #speedBox .racers b { color: var(--gold-bright); }

    /* ── Touch controls (bottom) ───────────────────────────── */
    #touch {
      grid-column: 1 / 4; grid-row: 3;
      align-self: end; justify-self: stretch;
      display: none;
      align-items: flex-end; justify-content: space-between;
      pointer-events: none;
    }
    body.touch #touch { display: flex; }
    body.touch #speedBox { display: none; }
    .tgroup { display: flex; gap: .55rem; pointer-events: auto; }
    .tbtn {
      width: 4.6rem; height: 4.6rem;
      display: flex; align-items: center; justify-content: center;
      border-radius: 1rem;
      border: 1px solid var(--border);
      background: rgba(19,19,23,.85);
      color: var(--text);
      font-size: 1.7rem; font-weight: 700;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      touch-action: none; user-select: none;
      transition: transform .05s, background .08s, border-color .08s;
    }
    .tbtn:active, .tbtn.held { transform: translateY(2px) scale(.97); }
    .tbtn.gas    { background: rgba(245,158,11,.22); border-color: var(--gold); color: var(--gold-bright); width: 5.6rem; height: 5.6rem; }
    .tbtn.gas.held    { background: rgba(245,158,11,.4); }
    .tbtn.brake  { background: rgba(239,68,68,.16); border-color: #7f1d1d; color: #fecaca; }
    .tbtn.brake.held  { background: rgba(239,68,68,.32); }
    .tbtn.steer.held  { background: rgba(228,228,231,.16); border-color: var(--muted); }

    /* ── Countdown ─────────────────────────────────────────── */
    #countdown {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 5;
    }
    #countdown .num {
      font-size: clamp(5rem, 26vw, 12rem);
      font-weight: 700; line-height: 1;
      color: var(--gold-bright);
      text-shadow: 0 0 50px rgba(245,158,11,.6);
      opacity: 0; transform: scale(.4);
    }
    #countdown .num.pop { animation: pop .9s ease-out forwards; }
    #countdown .num.go { color: var(--green); text-shadow: 0 0 60px rgba(34,197,94,.7); }
    @keyframes pop {
      0% { opacity: 0; transform: scale(.4); }
      25% { opacity: 1; transform: scale(1.08); }
      75% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.3); }
    }

    /* ── Lap flash toast ───────────────────────────────────── */
    #toast {
      grid-column: 2; grid-row: 2;
      align-self: start; justify-self: center;
      margin-top: 3.2rem;
      padding: .55rem 1.1rem; border-radius: .6rem;
      background: rgba(12,12,15,.9); border: 1px solid var(--gold);
      color: var(--gold-bright); font-weight: 600; font-size: 1rem;
      opacity: 0; transform: translateY(-8px); transition: opacity .25s, transform .25s;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Loading / start gate ──────────────────────────────── */
    #loader {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; background: radial-gradient(ellipse at center, #131317, #09090b);
      text-align: center; padding: 1.5rem;
    }
    #loader.hide { opacity: 0; pointer-events: none; transition: opacity .5s; }
    #loader .logo {
      font-size: clamp(1.8rem, 8vw, 3rem); font-weight: 700; letter-spacing: .02em;
    }
    #loader .logo b { color: var(--gold); }
    #loader .tag { color: var(--muted); font-size: .95rem; max-width: 26rem; }
    #loader .bar {
      width: 11rem; height: 4px; border-radius: 2px; overflow: hidden;
      background: var(--border); margin-top: .3rem;
    }
    #loader .bar i { display: block; height: 100%; width: 40%; background: var(--gold);
      border-radius: 2px; animation: slide 1.1s ease-in-out infinite; }
    @keyframes slide { 0% { transform: translateX(-110%); } 100% { transform: translateX(310%); } }
    #loader .who { color: var(--dim); font-size: .8rem; }
    #loader .who b { color: var(--gold-bright); font-weight: 600; }
    #loader .err { color: #fecaca; font-size: .82rem; max-width: 26rem; }
  </style>

  <script type="importmap">
  { "imports": { "three": "./three.module.js" } }
  </script>
  <script src="/worlds.js"></script>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>

    <div class="hud">
      <div class="panel" id="lapBox">
        <div class="row"><span class="lap-n" id="lapN">1</span><span class="lap-of">/ lap</span></div>
        <div class="timer" id="timer">0:00.00</div>
        <div class="best">best <b id="best">—</b></div>
        <div class="last" id="last"></div>
      </div>

      <div id="topCenter">
        <div id="brand"><b>KART</b> LOOP · worlds racing</div>
        <div id="wrongWay">↺ wrong way</div>
      </div>

      <div class="panel" id="board">
        <h3><span class="live"></span> best laps</h3>
        <ol id="boardList"><li class="empty">no laps yet — be the first</li></ol>
      </div>

      <div class="panel" id="speedBox">
        <div><span class="spd" id="spd">0</span> <span class="unit">km/h</span></div>
        <div class="racers"><b id="racerN">1</b> racer<span id="racerS"></span> on track</div>
      </div>

      <div id="toast"></div>

      <div id="touch">
        <div class="tgroup">
          <div class="tbtn steer" id="btnLeft" aria-label="steer left">◄</div>
          <div class="tbtn steer" id="btnRight" aria-label="steer right">►</div>
        </div>
        <div class="tgroup">
          <div class="tbtn brake" id="btnBrake" aria-label="brake / reverse">▼</div>
          <div class="tbtn gas" id="btnGas" aria-label="accelerate">▲</div>
        </div>
      </div>
    </div>

    <div id="countdown"><div class="num" id="cdNum"></div></div>

    <div id="loader">
      <div class="logo"><b>KART</b> LOOP</div>
      <div class="tag">Low-poly arcade kart racing. Pile in and lap your friends in real time.</div>
      <div class="bar"><i></i></div>
      <div class="who" id="loaderWho">connecting…</div>
      <div class="err" id="loaderErr"></div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
